<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<script type="text/javascript" src="extras/jquery.min.1.7.js"></script>
<script type="text/javascript" src="extras/modernizr.2.5.3.min.js"></script>
<link rel="stylesheet" href="css/style.css">
<style>
    /* Ensure the container fills the viewport */
    html, body { height: 100%; margin: 0; padding: 0; }
</style>
</head>
<body>

<div class="flipbook-viewport">
	<div class="container">
		<div class="flipbook">
			<div style="background-image:url(pages/1.jpg)"></div>
			<div style="background-image:url(pages/2.jpg)"></div>
			<div style="background-image:url(pages/3.jpg)"></div>
			<div style="background-image:url(pages/4.jpg)"></div>
			<div style="background-image:url(pages/5.jpg)"></div>
			<div style="background-image:url(pages/6.jpg)"></div>
			<div style="background-image:url(pages/7.jpg)"></div>
			<div style="background-image:url(pages/8.jpg)"></div>
			<div style="background-image:url(pages/9.jpg)"></div>
			<div style="background-image:url(pages/10.jpg)"></div>
		</div>
	</div>
</div>

<script type="text/javascript">

function loadApp() {
    var flipbook = $('.flipbook');

    // Check if we are on a mobile device
    var isMobile = $(window).width() < 600;
    
    // Set dynamic width and height based on screen
    var width = isMobile ? $(window).width() * 0.95 : 1123 * 2;
    var height = isMobile ? $(window).height() * 0.7 : 794;

	// Create the flipbook
	flipbook.turn({
			width: width,
			height: height,
			elevation: 50,
			gradients: true,
			autoCenter: true,
            // Use single page display on mobile
            display: isMobile ? 'single' : 'double'
	});

    // Handle window resize
    $(window).resize(function() {
        var newIsMobile = $(window).width() < 600;
        var newWidth = newIsMobile ? $(window).width() * 0.95 : 1123 * 2;
        var newHeight = newIsMobile ? $(window).height() * 0.7 : 794;
        
        flipbook.turn('size', newWidth, newHeight);
        flipbook.turn('display', newIsMobile ? 'single' : 'double');
    });
}

// Load the HTML4 version if there's no CSS transform
yepnope({
	test : Modernizr.csstransforms,
	yep: ['lib/turn.js'],
	nope: ['lib/turn.html4.min.js'],
	complete: loadApp
});

</script>

</body>
</html>
